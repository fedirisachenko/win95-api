services:
  db:
    image: postgres:13.0-alpine
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env.local
    networks:
      - network

  redis:
    image: redis:7-alpine
    ports:
      - "63791:6379"
    volumes:
      - redis_data:/data
    networks:
      - network

volumes:
  postgres_data:
  redis_data:

networks:
  network: